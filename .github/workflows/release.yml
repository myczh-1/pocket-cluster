name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Build web UI
        run: |
          cd web
          npm ci
          npm run build

      - name: Run tests
        run: go test ./...

      - name: Build Go binaries
        run: ./scripts/build.sh

      - name: Upload Go binaries
        uses: actions/upload-artifact@v4
        with:
          name: go-binaries
          path: dist/

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: sdkmanager --install "platforms;android-35" "build-tools;35.0.0"

      - uses: gradle/actions/setup-gradle@v4

      - name: Build web UI
        run: |
          cd web
          npm ci
          npm run build

      - name: Build Go binary for Android
        run: |
          mkdir -p android/app/src/main/jniLibs/arm64-v8a
          GOOS=android GOARCH=arm64 CGO_ENABLED=0 go build -o android/app/src/main/jniLibs/arm64-v8a/libpocketcluster.so ./cmd/agent

      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

  release:
    needs: [build-go, build-android]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Go binaries
        uses: actions/download-artifact@v4
        with:
          name: go-binaries
          path: dist/

      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: apk/

      - name: Rename APK
        run: mv apk/app-debug.apk dist/PocketCluster-${{ github.ref_name }}-debug.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/agent-darwin-arm64
            dist/agent-darwin-amd64
            dist/agent-linux-arm64
            dist/agent-linux-amd64
            dist/agent-windows-amd64.exe
            dist/agent-windows-arm64.exe
            dist/agent-android-arm64
            dist/PocketCluster-${{ github.ref_name }}-debug.apk
