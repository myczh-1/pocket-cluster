name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Build web UI
        run: |
          cd web
          npm ci
          npm run build

      - name: Run tests
        run: go test ./...

      - name: Build binary
        run: go build ./cmd/agent

  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v4

      - name: Build web UI
        run: |
          cd web
          npm ci
          npm run build

      - name: Build Go binary for Android
        run: |
          mkdir -p android/app/src/main/jniLibs/arm64-v8a
          GOOS=android GOARCH=arm64 CGO_ENABLED=0 go build -o android/app/src/main/jniLibs/arm64-v8a/libpocketcluster.so ./cmd/agent

      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk
